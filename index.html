<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonate Store Project</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Глубокий черный */
            color: #ffffff;
            font-family: sans-serif;
        }

        /* Шапка с текстурой */
        .header {
            background-image: url('img2.jpg');
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 3px solid #6b8e23; /* Тот самый зеленый акцент */
        }

        .header h1 {
            margin: 0;
            text-shadow: 2px 2px 4px #000;
            font-size: 28px;
        }

        /* Основной блок */
        .content {
            padding: 30px 20px;
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .logo-img {
            width: 100px;
            margin-bottom: 20px;
        }

        .description {
            font-size: 16px;
            line-height: 1.5;
            color: #d1d1d1;
            margin-bottom: 30px;
        }

        /* Кнопка скачивания */
        .download-btn {
            display: inline-block;
            background-color: #6b8e23;
            color: #ffffff;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            border-radius: 5px;
            border: 2px solid #fff;
        }

        /* Подвал */
        .footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 12px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RESONATE STORE PROJECT</h1>
    </div>

    <div class="content">
        <img src="img1.png" alt="Logo" class="logo-img">
        
        <div class="description">
            <p>Легкий и быстрый клиент для доступа к приложениям на старых Android-устройствах.</p>
            <p>Минимальные системные требования: Android 2.1+.</p>
        </div>

        <a href="resonate.apk" class="download-btn">СКАЧАТЬ</a>
    </div>

    <div class="footer">
        &copy; 2026 Resonate Store Project<br>
        resonateintegrated@gmail.com
    </div>

</body>
</html>
